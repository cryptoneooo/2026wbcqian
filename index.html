        :root {

            --bg: #08101e;

            --text: #e8eaf6;
            --text-dim: #8892b0;
            --border: #1e2d4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans TC', 'PingFang TC', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(160deg, #06101c 0%, #0e1e3a 50%, #06101c 100%);
            border-bottom: 2px solid var(--accent);
            padding: 24px 20px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(232,0,61,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 50%, rgba(245,166,35,0.07) 0%, transparent 55%);
        }
        .header-inner { position: relative; z-index: 1; }
        .wbc-badge {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 14px;
            border-radius: 30px;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: clamp(28px, 5vw, 46px);
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 30%, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.15;
            letter-spacing: 2px;
        }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-top: 8px; font-style: italic; }

        /* ── Ticker ── */
        .ticker-wrap { background: linear-gradient(90deg, var(--accent), #a8001c, var(--accent)); padding: 9px 0; overflow: hidden; }
        .ticker-track { display: flex; animation: ticker 40s linear infinite; white-space: nowrap; }
        .ticker-item { padding: 0 50px; font-size: 13px; font-weight: 600; color: #fff; }
        @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

        /* ── Layout ── */
        main { max-width: 760px; margin: 0 auto; padding: 30px 20px 60px; }

        /* ── Chat Window ── */
        .chat-window {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: #0d1827;
        }
        .chat-avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2c5a, var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .chat-name { font-weight: 800; font-size: 15px; }
        .chat-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
        .on-air {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            color: var(--accent); font-size: 11px; font-weight: 700; letter-spacing: 2px;
        }
        .air-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── Messages ── */
        .chat-messages {
            padding: 20px;
            min-height: 200px;
            max-height: 480px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Welcome message */
        .welcome-msg {
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
            line-height: 1.8;
            padding: 16px;
        }
        .welcome-msg strong { color: var(--gold); }

        /* User bubble */
        .msg-user {
            display: flex;
            justify-content: flex-end;
        }
        .bubble-user {
            background: var(--accent);
            color: #fff;
            padding: 12px 16px;
            border-radius: 18px 18px 4px 18px;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Qian bubble */
        .msg-qian {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }
        .msg-qian-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2c5a, var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .bubble-qian {
            background: #192236;
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 18px 18px 18px 4px;
            max-width: 85%;
            font-size: clamp(15px, 3vw, 18px);
            line-height: 1.85;
            font-weight: 500;
        }
        .bubble-qian .em   { color: var(--gold); font-weight: 800; }
        .bubble-qian .ex   { color: #ff4d6d; font-weight: 900; }
        .bubble-qian .pause{ color: var(--text-dim); }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: flex-end;
            gap: 10px;
        }
        .typing-indicator.visible { display: flex; }
        .typing-dots {
            background: #192236;
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 4px;
            padding: 14px 18px;
            display: flex; gap: 5px; align-items: center;
        }
        .typing-dots span {
            width: 7px; height: 7px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: typingBounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingBounce {
            0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)}
        }

        /* ── Situation chips ── */
        .chips-area {
            padding: 12px 20px 0;
            border-top: 1px solid var(--border);
        }
        .chips-label { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; letter-spacing: 1px; }
        .chips { display: flex; flex-wrap: wrap; gap: 7px; padding-bottom: 12px; }
        .chip {
            background: #0a1120;
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text-dim);
            font-size: 12px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
        }
        .chip:hover { border-color: var(--accent); color: #fff; background: rgba(232,0,61,0.1); }

        /* ── Input bar ── */
        .chat-input-area {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: #0d1827;
        }
        textarea {
            flex: 1;
            background: #111c30;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }
        textarea::placeholder { color: var(--text-dim); font-size: 14px; }
        textarea:focus { outline: none; border-color: var(--accent); }
        .send-btn {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            width: 48px; height: 48px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn:hover { background: #c0003a; transform: scale(1.05); }
        .send-btn:active { transform: scale(0.97); }

        /* ── Quotes DB ── */
        .section-heading {
            font-size: 20px; font-weight: 800;
            margin-bottom: 18px; display: flex; align-items: center; gap: 12px;

        .quotes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
        .q-card {
            background: var(--card-bg2); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px; transition: all 0.2s;

        .q-tags { margin-bottom: 10px; }

        .q-context { font-size:12px; color:var(--text-dim); border-top:1px solid var(--border); padding-top:10px; line-height:1.6; }
        .q-video { margin-top: 12px; border-radius: 10px; overflow: hidden; }
        .q-video iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

        footer { text-align:center; padding:32px 20px; color:var(--text-dim); font-size:12px; border-top:1px solid var(--border); line-height:1.8; margin-top: 40px; }

        @media(max-width:480px) {
            .chat-messages { max-height: 360px; }
            .bubble-user, .bubble-qian { max-width: 90%; }
        }
    </style>
</head>

];
const chipsEl = document.getElementById('chips');
CHIPS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = c;
    btn.onclick = () => {
        document.getElementById('userInput').value = c;
        handleSend();
    };
    chipsEl.appendChild(btn);
});

// Enter to send

    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// ── 情境關鍵字對應 ──
function detectSituation(text) {
    const t = text;
    if (t.match(/夾殺.*失誤|夾殺.*跑出|逼回去|夾殺.*跑者.*上/))                      return 'rundownerror';
    if (t.match(/再見全壘打/))                                                           return 'walkoff';
    if (t.match(/滿貫全壘打|大滿貫|滿壘全壘打/))                                       return 'grandslam';
    if (t.match(/再見安打|再見(一擊|打點|得分)|走了！|比賽結束/))                      return 'walkoff';
    if (t.match(/全壘打|轟出|越牆|飛越全壘打|一發|炸裂|大號飛行物|出牆/))             return 'homerun';
    if (t.match(/精彩守備|美技|魚躍|撲倒接|貼牆|神接|不可思議.*接|接到了.*不可能/))   return 'greatcatch';
    if (t.match(/雙殺打|雙殺/))                                                          return 'doubleplay';
    if (t.match(/觸擊.*得分|短打.*得分|觸擊.*回來|擠壓戰術/))                          return 'squeeze';
    if (t.match(/牽制出局|牽制.*出局/))                                                  return 'pickoff';
    if (t.match(/盜壘成功|成功盜壘|盜壘/))                                              return 'steal';
    if (t.match(/暴投/))                                                                  return 'wildpitch';
    if (t.match(/守備失誤|接球失誤|失誤/))                                              return 'error';
    if (t.match(/四壞球|保送|四壞保送/))                                                 return 'walk';
    if (t.match(/三振|揮空|揮棒落空/))                                                   return 'strikeout';
    if (t.match(/飛球.*接|接殺.*飛球|高飛球.*出局/))                                    return 'flyout';
    if (t.match(/觸身球|被砸/))                                                          return 'hbp';
    if (t.match(/安打|打出去.*安全|一壘安打|二壘安打|帶走跑者|打中|安全上壘/))        return 'hit';
    return 'unknown';
}

function getResponse(text) {
    const situation = detectSituation(text);
    const pool = DB[situation] || DB.unknown;
    return rand(pool);
}

//  Chat UI
// ══════════════════════════════════════════
function appendUserMsg(text) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg-user';
    div.innerHTML = `<div class="bubble-user">${escHtml(text)}</div>`;
    msgs.insertBefore(div, document.getElementById('typingIndicator'));
    scrollToBottom();
}

function appendQianMsg(text) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg-qian';
    div.innerHTML = `
        <div class="msg-qian-avatar">🎙️</div>
        <div class="bubble-qian">${formatText(text)}</div>
    `;
    msgs.insertBefore(div, document.getElementById('typingIndicator'));
    scrollToBottom();
}

function setTyping(visible) {
    document.getElementById('typingIndicator').classList.toggle('visible', visible);
    if (visible) scrollToBottom();
}

function scrollToBottom() {
    const msgs = document.getElementById('chatMessages');
    msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatText(text) {
    return escHtml(text)
        .replace(/！！！/g, '<span class="ex">！！！</span>')
        .replace(/！！/g,   '<span class="ex">！！</span>')
        .replace(/(全壘打|雙殺|美技|再見|滿貫|不可思議|神奇|完美|太帥)/g, '<span class="em">$1</span>')
        .replace(/⋯⋯/g, '<span class="pause">⋯⋯</span>');
}

function handleSend() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = '';

    // Remove welcome msg on first send
    const welcome = document.querySelector('.welcome-msg');
    if (welcome) welcome.remove();

    appendUserMsg(text);
    setTyping(true);

    // Simulate 錢公 thinking delay (600–1200ms)
    const delay = 600 + Math.random() * 600;
    setTimeout(() => {
        setTyping(false);
        appendQianMsg(getResponse(text));
    }, delay);
}
