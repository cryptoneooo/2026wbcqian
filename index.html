<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錢公語錄機 🎙️ | 2026 世界棒球經典賽特別版</title>
    <style>
        :root {
            --primary: #1a2c5a;
            --accent: #e8003d;
            --gold: #f5a623;
            --bg: #08101e;
            --card-bg: #111827;
            --card-bg2: #0f172a;
            --text: #e8eaf6;
            --text-dim: #8892b0;
            --border: #1e2d4a;
            --green: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans TC', 'PingFang TC', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(160deg, #06101c 0%, #0e1e3a 50%, #06101c 100%);
            border-bottom: 2px solid var(--accent);
            padding: 28px 20px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(232,0,61,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 50%, rgba(245,166,35,0.07) 0%, transparent 55%);
            animation: headerGlow 5s ease-in-out infinite alternate;
        }
        @keyframes headerGlow {
            from { opacity: 0.7; }
            to   { opacity: 1; }
        }
        .header-inner { position: relative; z-index: 1; }
        .wbc-badge {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 14px;
            border-radius: 30px;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 30%, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.15;
            letter-spacing: 2px;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 15px;
            margin-top: 10px;
            font-style: italic;
        }

        /* ── Ticker ── */
        .ticker-wrap {
            background: linear-gradient(90deg, var(--accent), #a8001c, var(--accent));
            padding: 10px 0;
            overflow: hidden;
        }
        .ticker-track {
            display: flex;
            animation: ticker 40s linear infinite;
            white-space: nowrap;
        }
        .ticker-item {
            padding: 0 50px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }
        @keyframes ticker {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ── Layout ── */
        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 36px 20px 60px;
        }

        /* ── Cards ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 28px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        /* ── Form ── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .form-group { display: flex; flex-direction: column; gap: 7px; }
        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        select, input[type="number"] {
            background: #0a1120;
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            padding: 10px 13px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,0,61,0.12);
        }
        select option { background: #0a1120; }

        /* ── Situation buttons ── */
        .situation-label-text {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }
        .situation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px;
            margin-bottom: 24px;
        }
        .sit-btn {
            background: #0a1120;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-dim);
            padding: 11px 6px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.18s;
            text-align: center;
            line-height: 1.4;
        }
        .sit-btn:hover { border-color: #3a4f7a; color: var(--text); }
        .sit-btn.active {
            background: rgba(232,0,61,0.12);
            border-color: var(--accent);
            color: #ff4d6d;
            font-weight: 700;
        }

        /* ── Generate button ── */
        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #e8003d, #a8001c);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            padding: 18px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 3px;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .generate-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
        }
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(232,0,61,0.45);
        }
        .generate-btn:active { transform: translateY(0); }

        /* ── Output ── */
        .output-card {
            display: none;
            background: linear-gradient(160deg, #0f1729, #111f38);
            border: 1px solid #2a3d66;
            border-radius: 18px;
            padding: 28px;
            margin-bottom: 28px;
        }
        .output-card.visible {
            display: block;
            animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Scoreboard */
        .scoreboard {
            background: #060e1a;
            border: 1px solid var(--gold);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 22px;
            font-family: 'Courier New', monospace;
        }
        .scoreboard-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .sb-team { color: var(--gold); font-weight: 700; font-size: 15px; }
        .sb-score { font-size: 32px; font-weight: 900; color: #fff; letter-spacing: 4px; }
        .sb-meta {
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            font-family: inherit;
        }

        /* Commentator header */
        .commentator-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }
        .avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2c5a, var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(232,0,61,0.3);
        }
        .commentator-info h3 { font-size: 18px; font-weight: 800; }
        .commentator-info p  { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
        .on-air {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .air-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .situation-tag {
            display: inline-block;
            background: rgba(245,166,35,0.14);
            color: var(--gold);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 30px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }
        .commentary-text {
            font-size: clamp(18px, 3.5vw, 24px);
            line-height: 1.9;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .commentary-text .em  { color: var(--gold); font-weight: 800; }
        .commentary-text .ex  { color: #ff4d6d; font-weight: 900; font-size: 1.15em; }
        .commentary-text .pause { color: var(--text-dim); }

        /* ── Quotes DB ── */
        .section-heading {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
        }
        .section-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .quotes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 14px;
        }
        .q-card {
            background: var(--card-bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            transition: all 0.2s;
            cursor: default;
        }
        .q-card:hover {
            border-color: rgba(245,166,35,0.5);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .q-tags { margin-bottom: 10px; }
        .q-tag {
            display: inline-block;
            background: rgba(26,44,90,0.9);
            color: var(--text-dim);
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 5px;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .q-text {
            font-size: 14px;
            line-height: 1.75;
            color: var(--text);
            margin-bottom: 12px;
            font-style: italic;
        }
        .q-context {
            font-size: 12px;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            padding-top: 10px;
            line-height: 1.6;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-dim);
            font-size: 12px;
            border-top: 1px solid var(--border);
            line-height: 1.8;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .situation-grid { grid-template-columns: repeat(3, 1fr); }
            .scoreboard-main { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="wbc-badge">⚾ 2026 WORLD BASEBALL CLASSIC</div>
        <h1>錢公語錄機 🎙️</h1>
        <p class="subtitle">輸入戰況，聽錢定遠為你解說！「這只是一個平凡的飛球⋯⋯」</p>
    </div>
</header>

<div class="ticker-wrap">
    <div class="ticker-track" id="ticker"></div>
</div>

<main>

    <!-- Input card -->
    <div class="card">
        <div class="card-title">🏟️ 輸入當前戰況</div>

        <div class="form-grid">
            <div class="form-group">
                <label>主隊</label>
                <select id="homeTeam">
                    <option value="台灣">🇹🇼 台灣</option>
                    <option value="日本">🇯🇵 日本</option>
                    <option value="美國">🇺🇸 美國</option>
                    <option value="多明尼加">🇩🇴 多明尼加</option>
                    <option value="古巴">🇨🇺 古巴</option>
                    <option value="韓國">🇰🇷 韓國</option>
                    <option value="墨西哥">🇲🇽 墨西哥</option>
                    <option value="波多黎各">🇵🇷 波多黎各</option>
                    <option value="荷蘭">🇳🇱 荷蘭</option>
                    <option value="義大利">🇮🇹 義大利</option>
                    <option value="委內瑞拉">🇻🇪 委內瑞拉</option>
                    <option value="巴拿馬">🇵🇦 巴拿馬</option>
                    <option value="澳洲">🇦🇺 澳洲</option>
                    <option value="以色列">🇮🇱 以色列</option>
                </select>
            </div>
            <div class="form-group">
                <label>客隊</label>
                <select id="awayTeam">
                    <option value="日本">🇯🇵 日本</option>
                    <option value="台灣">🇹🇼 台灣</option>
                    <option value="美國">🇺🇸 美國</option>
                    <option value="多明尼加">🇩🇴 多明尼加</option>
                    <option value="古巴">🇨🇺 古巴</option>
                    <option value="韓國">🇰🇷 韓國</option>
                    <option value="墨西哥">🇲🇽 墨西哥</option>
                    <option value="波多黎各">🇵🇷 波多黎各</option>
                    <option value="荷蘭">🇳🇱 荷蘭</option>
                    <option value="義大利">🇮🇹 義大利</option>
                    <option value="委內瑞拉">🇻🇪 委內瑞拉</option>
                    <option value="巴拿馬">🇵🇦 巴拿馬</option>
                    <option value="澳洲">🇦🇺 澳洲</option>
                    <option value="以色列">🇮🇱 以色列</option>
                </select>
            </div>
            <div class="form-group">
                <label>主隊比分</label>
                <input type="number" id="homeScore" value="0" min="0" max="30">
            </div>
            <div class="form-group">
                <label>客隊比分</label>
                <input type="number" id="awayScore" value="0" min="0" max="30">
            </div>
            <div class="form-group">
                <label>局數</label>
                <select id="inning">
                    <option>1局上</option><option>1局下</option>
                    <option>2局上</option><option>2局下</option>
                    <option>3局上</option><option>3局下</option>
                    <option>4局上</option><option>4局下</option>
                    <option>5局上</option><option>5局下</option>
                    <option>6局上</option><option>6局下</option>
                    <option>7局上</option><option>7局下</option>
                    <option>8局上</option><option>8局下</option>
                    <option>9局上</option><option selected>9局下</option>
                    <option>延長10局上</option><option>延長10局下</option>
                    <option>延長11局上</option><option>延長11局下</option>
                </select>
            </div>
            <div class="form-group">
                <label>出局數</label>
                <select id="outs">
                    <option value="0">0 出局</option>
                    <option value="1">1 出局</option>
                    <option value="2">2 出局</option>
                </select>
            </div>
            <div class="form-group">
                <label>壘上狀況</label>
                <select id="bases">
                    <option value="none">無人在壘</option>
                    <option value="first">一壘有人</option>
                    <option value="second">二壘有人</option>
                    <option value="third">三壘有人</option>
                    <option value="first-second">一二壘有人</option>
                    <option value="first-third">一三壘有人</option>
                    <option value="second-third">二三壘有人（得點圈）</option>
                    <option value="loaded">滿壘！</option>
                </select>
            </div>
            <div class="form-group">
                <label>球數</label>
                <select id="count">
                    <option>0好0壞</option>
                    <option>1好0壞</option><option>0好1壞</option>
                    <option>2好0壞</option><option>1好1壞</option><option>0好2壞</option>
                    <option>3好0壞</option><option>2好1壞</option><option>1好2壞</option>
                    <option>3好1壞</option><option>2好2壞</option>
                    <option selected>3好2壞（滿球數）</option>
                </select>
            </div>
        </div>

        <div class="situation-label-text">⚡ 發生了什麼事？</div>
        <div class="situation-grid" id="situationGrid">
            <button class="sit-btn" data-type="homerun">🚀<br>全壘打</button>
            <button class="sit-btn" data-type="grandslam">💥<br>滿貫全壘打</button>
            <button class="sit-btn" data-type="hit">🏃<br>安打</button>
            <button class="sit-btn" data-type="strikeout">💨<br>三振出局</button>
            <button class="sit-btn" data-type="flyout">🌤️<br>飛球接殺</button>
            <button class="sit-btn" data-type="doubleplay">⚡<br>雙殺打</button>
            <button class="sit-btn" data-type="walk">🚶<br>四壞球</button>
            <button class="sit-btn" data-type="greatcatch">🤿<br>精彩美技</button>
            <button class="sit-btn" data-type="error">😱<br>守備失誤</button>
            <button class="sit-btn" data-type="wildpitch">💫<br>暴投</button>
            <button class="sit-btn" data-type="steal">💨<br>盜壘成功</button>
            <button class="sit-btn" data-type="pickoff">🤣<br>牽制出局</button>
            <button class="sit-btn" data-type="squeeze">🤏<br>觸擊得分</button>
            <button class="sit-btn" data-type="walkoff">🎉<br>再見安打</button>
            <button class="sit-btn" data-type="hbp">🩹<br>觸身球</button>
            <button class="sit-btn" data-type="pitchchange">🔄<br>投手換人</button>
        </div>

        <button class="generate-btn" onclick="generateCommentary()">🎙️ 讓錢公說話！</button>
    </div>

    <!-- Output card -->
    <div class="output-card" id="outputCard">
        <div class="scoreboard" id="scoreboard"></div>
        <div class="commentator-header">
            <div class="avatar">🎙️</div>
            <div class="commentator-info">
                <h3>錢定遠（錢公）</h3>
                <p>CPBL元年球評・服務台灣棒球35年・富邦悍將之聲</p>
            </div>
            <div class="on-air">
                <div class="air-dot"></div>ON AIR
            </div>
        </div>
        <div class="situation-tag" id="situationTag"></div>
        <div class="commentary-text" id="commentaryText"></div>
    </div>

    <!-- Classic quotes DB -->
    <div class="section-heading">🏆 錢公經典語錄資料庫</div>
    <div class="quotes-grid" id="quotesGrid"></div>

</main>

<footer>
    <p>⚾ 2026 世界棒球經典賽 | 本網站為致敬台灣棒球文化而製作，非官方作品</p>
    <p>錢定遠（錢公）：台灣職棒開幕元年球評（1989年），解說生涯超過35年</p>
    <p style="margin-top:8px;opacity:0.5;">名言資料庫根據歷年公開影片、報導及球迷整理，僅供娛樂用途</p>
</footer>

<script>
// ══════════════════════════════════════════
//  經典語錄資料庫
// ══════════════════════════════════════════
const QUOTES = [
    {
        text: "這只是一個平凡的飛球⋯⋯啊！！全壘打！！！這是全壘打啊！！太不可思議了！！",
        context: "錢公最招牌的語錄。飛球明明看似普通，球卻飛出全壘打牆，錢公的反應落差極大，成為台灣棒球史上最知名的解說名場面，也是無數梗圖的起源。",
        tags: ["招牌語錄", "全壘打", "梗圖始祖"]
    },
    {
        text: "不可能！岳東華這個球竟然撲⋯⋯撲到了！！太神奇了！太神奇了！我不敢相信！！",
        context: "2019年中職，富邦悍將外野手岳東華做出精彩魚躍接球，錢公情緒激動到語塞，連「撲到」都說不出來，是近年最廣傳的名場面之一。",
        tags: ["精彩守備", "名場面", "2019年"]
    },
    {
        text: "逼回去就好了啊！逼回去！不要去接！逼回去！",
        context: "夾殺跑者時，錢公習慣大喊「逼回去」，意指守備方應把跑者逼向一壘，不要冒進追殺。這句口頭禪已成為台灣棒球文化的一部分。",
        tags: ["口頭禪", "夾殺", "守備戰術"]
    },

let selectedSituation = null;

document.querySelectorAll('.sit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.sit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSituation = btn.dataset.type;
    });
});

const rand = arr => arr[Math.floor(Math.random() * arr.length)];

const DIRS   = ['左外野', '中外野', '右外野', '左中間', '右中間', '一二壘間', '游擊區', '三壘方向'];
const PITCHES = ['滑球', '變化球', '卡特球', '指叉球', '快速直球', '兩縫線快速球', '曲球', '快速球'];
const POSES  = ['游擊手', '二壘手', '三壘手', '一壘手', '投手'];

function getScoreCtx(home, away, hs, as_) {
    const d = hs - as_;
    if (d >  3) return `${home}現在大幅領先${hs}：${as_}！`;
    if (d === 2) return `${home}以${hs}：${as_}領先兩分！`;
    if (d === 1) return `${home}以${hs}：${as_}領先一分！`;
    if (d === 0) return `比數${hs}：${as_}持平！`;
    if (d === -1) return `${home}以${hs}：${as_}落後一分！追分是關鍵！`;
    if (d === -2) return `${home}以${hs}：${as_}落後兩分！`;
    return `${home}以${hs}：${as_}大幅落後！需要奇蹟！`;
}

function getInningCtx(inning, outs) {
    const late = ['7局','8局','9局','延長'].some(s => inning.includes(s));
    if (late && outs === '2') return '現在是最後關頭！';
    if (late) return '比賽進入了最關鍵的時刻！';
    if (inning.includes('5局') || inning.includes('6局')) return '比賽進入中段！';
    return '';
}

function getBasesCtx(bases) {
    return {
        none: '壘上無人',
        first: '一壘有人，',
        second: '二壘有人，',
        third: '三壘有人，',
        'first-second': '一二壘有人，',
        'first-third': '一三壘有人，',
        'second-third': '得點圈有人，',
        loaded: '滿壘！滿壘！'
    }[bases] || '';
}

function getOutsText(outs) {
    return ['一','二','三'][parseInt(outs)] || outs;
}

function fillTemplate(tpl, vars) {
    return tpl
        .replace(/{HOME}/g,  vars.home)
        .replace(/{AWAY}/g,  vars.away)
        .replace(/{SCORE}/g, vars.score)
        .replace(/{INNING}/g,vars.inning)
        .replace(/{BASE}/g,  vars.base)
        .replace(/{OUTS}/g,  vars.outs)
        .replace(/{DIR}/g,   rand(DIRS))
        .replace(/{PITCH}/g, rand(PITCHES))
        .replace(/{POS}/g,   rand(POSES))
        .replace(/{PAUSE}/g, '⋯⋯');
}

function generateCommentary() {

        alert('請先選擇「發生了什麼事」！');
        return;
    }
    const home  = document.getElementById('homeTeam').value;
    const away  = document.getElementById('awayTeam').value;
    const hs    = parseInt(document.getElementById('homeScore').value) || 0;
    const as_   = parseInt(document.getElementById('awayScore').value) || 0;
    const inning = document.getElementById('inning').value;
    const outs  = document.getElementById('outs').value;
    const count = document.getElementById('count').value;
    const bases = document.getElementById('bases').value;

    const vars = {
        home,
        away,
        score:  getScoreCtx(home, away, hs, as_),
        inning: getInningCtx(inning, outs),
        base:   getBasesCtx(bases),
        outs:   getOutsText(outs)
    };

    const resp = RESPONSES[selectedSituation];
    const raw  = fillTemplate(rand(resp.templates), vars);

    // Scoreboard
    document.getElementById('scoreboard').innerHTML = `
        <div class="scoreboard-main">
            <span class="sb-team">${away}（客）</span>
            <span class="sb-score">${as_} ： ${hs}</span>
            <span class="sb-team">（主）${home}</span>
        </div>
        <div class="sb-meta">${inning} ｜ ${outs}出局 ｜ ${count} ｜ ${getBasesCtx(bases) || '無人在壘'}</div>
    `;

    // Commentary
    document.getElementById('situationTag').textContent = resp.label;
    document.getElementById('commentaryText').innerHTML = formatText(raw);

    const out = document.getElementById('outputCard');
    out.classList.add('visible');
    out.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function formatText(text) {
    return text
        .replace(/！！！/g, '<span class="ex">！！！</span>')
        .replace(/！！/g,  '<span class="ex">！！</span>')
        .replace(/(全壘打|雙殺|美技|再見|滿貫|不可思議|神奇|完美|太帥)/g, '<span class="em">$1</span>')
        .replace(/⋯⋯/g, '<span class="pause">⋯⋯</span>');
}
